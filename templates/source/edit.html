{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <h1 class="h3 mb-4 text-gray-800">Edit Source</h1>

    <form method="post" action="/source/edit/{{ source.id }}">
        <div class="form-group">
            <label for="name">Nama Source</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ source.name }}" required>
        </div>
        <button type="submit" class="btn btn-success">Simpan</button>
        <a href="/source" class="btn btn-secondary">Batal</a>
    </form>
</div>
{% endblock %}
