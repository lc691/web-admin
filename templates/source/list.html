{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <h1 class="h3 mb-4 text-gray-800">Daftar Source</h1>

    <!-- Form pencarian -->
    <form method="get" action="/source" class="mb-3">
        <input type="text" name="q" placeholder="Cari source..." value="{{ q }}" class="form-control w-25 d-inline">
        <button type="submit" class="btn btn-primary">Cari</button>
        <a href="/source" class="btn btn-secondary">Reset</a>
    </form>

    <!-- Tabel list source -->
    <div class="card shadow mb-4">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered" width="100%" cellspacing="0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nama Source</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for src in sources %}
                        <tr>
                            <td>{{ src.id }}</td>
                            <td>{{ src.name }}</td>
                            <td>
                                <a href="/source/edit/{{ src.id }}" class="btn btn-sm btn-warning">Edit</a>
                                <form action="/source/delete/{{ src.id }}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Hapus source ini?')">Hapus</button>
                                </form>
                            </td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="3">Tidak ada source</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
