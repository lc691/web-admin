<style>
/* ==========================================================

.calendar-grid {

}

/* ==========================================================

   ========================================================== */

.day-cell {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 170px;
    background: var(--tblr-bg-surface);
    border: 1px solid var(--tblr-border-color);
    border-radius: 0.75rem;
    padding: 0.75rem;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
}

.day-cell::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.02));
    pointer-events: none;
}

.day-cell:hover {
    transform: translateY(-3px);
    border-color: var(--tblr-primary);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
    z-index: 1;
}

.day-cell:active {
    transform: scale(0.98);
}

.day-cell.empty {
    background: transparent;
    border: none;
    box-shadow: none;
    cursor: default;
    min-height: auto;
}

.day-cell.empty:hover {
    transform: none;
    box-shadow: none;
}

.day-cell.heat-none {
    opacity: 0.6;
}
.day-cell.heat-low {

}
.day-cell.heat-medium {
    border-left: 3px solid var(--tblr-warning);
}
.day-cell.heat-high {

}
.day-cell.heat-critical {
    border-left: 3px solid var(--tblr-dark);
    background: rgba(0, 0, 0, 0.03);
}

.day-cell.priority-critical {
    border-color: var(--tblr-dark);
}
.day-cell.priority-high {
    border-color: var(--tblr-danger);
}
.day-cell.priority-medium {
    border-color: var(--tblr-warning);
}
.day-cell.priority-normal {
    border-color: var(--tblr-success);
}

}

}
