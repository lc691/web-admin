<div class="filter-section">
    <form
        method="GET"
        action="{{ url_for('portal_joki_admin_laporan') }}"
        class="row g-3 align-items-end"
    >

        <!-- ===================================================== -->
        <!-- VIEW -->
        <!-- ===================================================== -->
        <div class="col-md-3">
            <label class="form-label small text-muted">
                View
            </label>

            <select
                name="view"
                class="form-select"
            >
                <option
                    value="bulanan"
                    {% if view == "bulanan" %}selected{% endif %}
                >
                    Bulanan
                </option>

                <option
                    value="harian"
                    {% if view == "harian" %}selected{% endif %}
                >
                    Harian
                </option>

                <option
                    value="statistik"
                    {% if view == "statistik" %}selected{% endif %}
                >
                    Statistik
                </option>
            </select>
        </div>

        <!-- ===================================================== -->
        <!-- TAHUN -->
        <!-- ===================================================== -->
        <div class="col-md-2">
            <label class="form-label small text-muted">
                Tahun
            </label>

            <select
                name="tahun"
                class="form-select"
            >
                {% for y in range(tahun, tahun - 5, -1) %}
                    <option value="{{ y }}" {% if y == tahun %}selected{% endif %}>
                        {{ y }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <!-- ===================================================== -->
        <!-- BULAN -->
        <!-- ===================================================== -->
        <div class="col-md-2">
            <label class="form-label small text-muted">
                Bulan
            </label>

            <select
                name="bulan"
                class="form-select"
            >
                {% for m in range(1, 13) %}
                <option
                    value="{{ m }}"
                    {% if bulan == m %}selected{% endif %}
                >
                    {{ get_month_name(m) }}
                </option>
                {% endfor %}
            </select>
        </div>

        <!-- ===================================================== -->
        <!-- TANGGAL -->
        <!-- ===================================================== -->
        <div class="col-md-3">
            <label class="form-label small text-muted">
                Tanggal
            </label>

            <input
                type="date"
                name="tanggal"
                class="form-control"
                value="{{ tanggal or '' }}"
            >
        </div>

        <!-- ===================================================== -->
        <!-- ACTION -->
        <!-- ===================================================== -->
        <div class="col-md-2">
            <div class="d-flex gap-2">

                <button
                    type="submit"
                    class="btn btn-primary flex-fill"
                >
                    <i class="ti ti-search me-1"></i>
                    Tampilkan
                </button>

                <a
                    href="{{ url_for('portal_joki_admin_laporan') }}"
                    class="btn btn-outline-secondary"
                    title="Reset Filter"
                >
                    <i class="ti ti-refresh"></i>
                </a>

            </div>
        </div>

    </form>
</div>
