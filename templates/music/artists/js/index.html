<!-- INDEX PAGE SCRIPTS -->
<!-- ===================================================== -->

<script>
    let autoRefreshInterval = null;

    function startAutoRefresh() {
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        autoRefreshInterval = setInterval(() => {
            if (!document.hidden) refreshTable();
        }, 60000);
    }

    function stopAutoRefresh() {
        if (autoRefreshInterval) {
            clearInterval(autoRefreshInterval);
            autoRefreshInterval = null;
        }
    }

    function exportData(format) {
        const channelId = document.getElementById('filter-channel')?.value || '';
        window.location.href = `/api/artists/export?channel_id=${channelId}&format=${format}`;
    }

    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'r') {
            e.preventDefault();
            refreshTable();
        }
        if (e.key === 'Escape') {
            document.querySelectorAll('.modal.show').forEach(modal => {
                const instance = bootstrap.Modal.getInstance(modal);
                if (instance) instance.hide();
            });
        }
    });

    window.addEventListener('beforeunload', function() {
        stopAutoRefresh();
        if (artistsTable) {
            artistsTable.destroy();
            artistsTable = null;
        }
    });

    document.addEventListener('DOMContentLoaded', function() {
        startAutoRefresh();
        console.log('Artist page initialized');
    });
</script>
