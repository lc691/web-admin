<!-- ===================================================== -->
<!-- DELETE HANDLER -->
<!-- ===================================================== -->

<script>
    function confirmDelete(artistId, artistName) {
        document.getElementById('delete-artist-id').value = artistId;
        document.getElementById('delete-artist-name').textContent = artistName;
        document.getElementById('delete-force').checked = false;
        const modal = new bootstrap.Modal(document.getElementById('modal-delete'));
        modal.show();
    }

    function deleteArtist() {
        const artistId = document.getElementById('delete-artist-id').value;
        const force = document.getElementById('delete-force').checked;

        if (!artistId) {
            showToast('ID artist tidak valid', 'error');
            return;
        }

        const btn = document.getElementById('btn-confirm-delete');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="ti ti-spinner ti-spin me-1"></i> Menghapus...';

        const url = `/api/artists/${artistId}${force ? '?force=true' : ''}`;

        fetch(url, { method: 'DELETE' })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    showToast(data.message || 'Artist berhasil dihapus', 'success');
                    document.getElementById('modal-delete').querySelector('.btn-close').click();
                    refreshTable();
                } else {
                    showToast(data.message || 'Gagal menghapus artist', 'error');
                }
            })
            .catch(err => {
                showToast('Gagal menghapus artist: ' + err.message, 'error');
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = originalText;
            });
    }

    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('btn-confirm-delete').addEventListener('click', deleteArtist);
    });
</script>
