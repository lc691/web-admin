<!-- ===================================================== -->
<!-- BULK OPERATIONS HANDLER -->
<!-- ===================================================== -->

<script>
    function bulkDelete() {
        const selected = getSelectedIds();
        if (selected.length === 0) {
            showToast('Pilih minimal satu artist untuk dihapus', 'warning');
            return;
        }

        if (!confirm(`Yakin ingin menghapus ${selected.length} artist yang dipilih?`)) return;

        const modal = bootstrap.Modal.getInstance(document.getElementById('modal-bulk'));
        if (modal) modal.hide();

        showToast(`Menghapus ${selected.length} artist...`, 'info');

        apiFetch('/api/artists/bulk', {
            method: 'DELETE',
            body: JSON.stringify({ ids: selected, force: false })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                showToast(data.message || `${selected.length} artist berhasil dihapus`, 'success');
                refreshTable();
            } else {
                showToast(data.message || 'Gagal menghapus artist', 'error');
            }
        })
        .catch(err => {
            showToast('Gagal menghapus artist: ' + err.message, 'error');
        });
    }

    function bulkDeleteSelected() {
        document.getElementById('modal-bulk').querySelector('.btn-close').click();
        bulkDelete();
    }

    function bulkUpdateChannelSelected() {
        const selected = getSelectedIds();
        if (selected.length === 0) {
            showToast('Pilih minimal satu artist', 'warning');
            return;
        }

        document.getElementById('channel-artist-ids').value = JSON.stringify(selected);
        document.getElementById('channel-artist-count').textContent = selected.length;
        document.getElementById('channel-select').value = '';

        document.getElementById('modal-bulk').querySelector('.btn-close').click();
        const modal = new bootstrap.Modal(document.getElementById('modal-channel'));
        modal.show();
    }

    function bulkUpdateChannel() {
        const selected = getSelectedIds();
        if (selected.length === 0) {
            showToast('Pilih minimal satu artist', 'warning');
            return;
        }

        document.getElementById('channel-artist-ids').value = JSON.stringify(selected);
        document.getElementById('channel-artist-count').textContent = selected.length;
        document.getElementById('channel-select').value = '';

        const modal = new bootstrap.Modal(document.getElementById('modal-channel'));
        modal.show();
    }

    function confirmBulkUpdateChannel() {
        const artistIds = JSON.parse(document.getElementById('channel-artist-ids').value || '[]');
        const channelId = document.getElementById('channel-select').value;

        if (!channelId) {
            showToast('Pilih channel tujuan', 'warning');
            return;
        }

        if (artistIds.length === 0) {
            showToast('Tidak ada artist yang dipilih', 'error');
            return;
        }

        document.getElementById('modal-channel').querySelector('.btn-close').click();

        showToast(`Memindahkan ${artistIds.length} artist ke channel baru...`, 'info');

        apiFetch('/api/artists/bulk/update-channel', {
            method: 'POST',
            body: JSON.stringify({ ids: artistIds, channel_id: parseInt(channelId) })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                showToast(data.message || `${artistIds.length} artist berhasil dipindahkan`, 'success');
                refreshTable();
            } else {
                showToast(data.message || 'Gagal memindahkan artist', 'error');
            }
        })
        .catch(err => {
            showToast('Gagal memindahkan artist: ' + err.message, 'error');
        });
    }

    function bulkExportSelected() {
        const selected = getSelectedIds();
        if (selected.length === 0) {
            showToast('Pilih minimal satu artist untuk diexport', 'warning');
            return;
        }

        document.getElementById('modal-bulk').querySelector('.btn-close').click();

        apiFetch('/api/artists/bulk/export?format=csv&include_stats=true', {
            method: 'POST',
            body: JSON.stringify(selected)
        })
        .then(res => res.blob())
        .then(blob => {
            const downloadUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = `artists_export_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(downloadUrl);
            showToast(`Berhasil mengexport ${selected.length} artist`, 'success');
        })
        .catch(err => {
            showToast('Gagal mengexport data: ' + err.message, 'error');
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('btn-confirm-channel').addEventListener('click', confirmBulkUpdateChannel);
    });
</script>
