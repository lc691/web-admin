<script>
    // Toast notification
    function showToast(message, type = 'success') {
        const colors = {
            success: 'bg-success text-white',
            error: 'bg-danger text-white',
            warning: 'bg-warning text-dark',
            info: 'bg-info text-white'
        };

        let container = document.getElementById('toast-container');
        if (!container) {
            container = document.createElement('div');
            container.id = 'toast-container';
            container.className = 'position-fixed bottom-0 end-0 p-3';
            container.style.zIndex = '1050';
            document.body.appendChild(container);
        }

        const toast = document.createElement('div');
        toast.className = `toast align-items-center ${colors[type] || colors.info} border-0`;
        toast.role = 'alert';
        toast.innerHTML = `
            <div class="d-flex">
                <div class="toast-body">${message}</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        `;

        container.appendChild(toast);
        const bsToast = new bootstrap.Toast(toast, { delay: 5000 });
        bsToast.show();

        setTimeout(() => {
            if (toast.parentNode) toast.remove();
        }, 5500);
    }

    // Format number
    function formatNumber(value, decimals = 0) {
        if (value === null || value === undefined) return '0';
        try {
            const num = parseFloat(value);
            if (isNaN(num)) return '0';
            if (decimals === 0) return num.toLocaleString('id-ID');
            return num.toLocaleString('id-ID', {
                minimumFractionDigits: decimals,
                maximumFractionDigits: decimals
            });
        } catch (e) {
            return String(value);
        }
    }

    // Format date
    function formatDate(dateString) {
        if (!dateString) return '-';
        try {
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return '-';
            return date.toLocaleDateString('id-ID', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        } catch (e) {
            return '-';
        }
    }

    // Get CSRF token
    function getCsrfToken() {
        return document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || '';
    }

    // API fetch with CSRF
    function apiFetch(url, options = {}) {
        return fetch(url, {
            ...options,
            headers: {
                'Content-Type': 'application/json',
                'X-CSRF-Token': getCsrfToken(),
                ...(options.headers || {})
            },
            credentials: 'same-origin'
        });
    }

    // Get selected IDs
    function getSelectedIds() {
        const checkboxes = document.querySelectorAll('.row-checkbox:checked');
        return Array.from(checkboxes).map(cb => parseInt(cb.value));
    }

    // =====================================================
    // FUNGSI TAMBAHAN
    // =====================================================

    // Refresh table (akan di-override oleh datatable)
    function refreshTable() {
        if (typeof artistsTable !== 'undefined' && artistsTable) {
            artistsTable.ajax.reload(null, false);
        } else {
            location.reload();
        }
    }
</script>
