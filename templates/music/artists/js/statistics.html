<script>
"use strict";

/* ==========================================================
 * Artist Statistics
 * ========================================================== */

const ArtistStatistics = (() => {

    async function load() {

        try {

            const data = await ArtistUtils.request(
                "/api/artists/statistics"
            );

            update(data);

        } catch (error) {

            console.error(error);

            ArtistUtils.showError(
                error.message
            );

        }

    }

    function update(data) {

        setValue(
            "stat-total-artists",
            data.total_artists
        );

        setValue(
            "stat-total-songs",
            data.total_songs
        );

        setValue(
            "stat-active-channels",
            data.active_channels
        );

        setValue(
            "stat-artists-without-songs",
            data.artists_without_songs
        );

    }

    function setValue(id, value) {

        const element = document.getElementById(id);

        if (!element) {
            return;
        }

        element.textContent =
            ArtistUtils.formatNumber(value);

    }

    return {

        load,
        update

    };

})();
</script>
