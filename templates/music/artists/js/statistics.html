<!-- STATISTICS SCRIPTS -->
<!-- ===================================================== -->

<script>
    async function updateStatistics() {
        try {
            const channelId = document.getElementById('filter-channel')?.value;
            let url = '/api/artists/statistics';
            if (channelId) url += `?channel_id=${channelId}`;

            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);

            const json = await response.json();
            const stats = json.data ?? json;

            document.getElementById('stat-total-artists').textContent = formatNumber(stats.total_artists ?? 0);
            document.getElementById('stat-total-songs').textContent = formatNumber(stats.total_songs ?? 0);
            document.getElementById('stat-active-channels').textContent = formatNumber(stats.active_channels ?? 0);
            document.getElementById('stat-artists-with-songs').textContent = formatNumber(stats.artists_with_songs ?? 0);
            document.getElementById('stat-artists-without-songs').textContent = formatNumber(stats.artists_without_songs ?? 0);
            document.getElementById('stat-avg-songs').textContent = Number(stats.avg_songs_per_artist ?? 0).toFixed(1);
        } catch (error) {
            console.error("Error updating statistics:", error);
        }
    }

    // Update statistics every 30 seconds
    setInterval(updateStatistics, 30000);
</script>
