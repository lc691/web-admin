<!-- CHARTS -->
<!-- ===================================================== -->

<div class="row row-deck row-cards mb-4">

    <!-- Status Distribution -->
    <div class="col-lg-6">

        <div class="card h-100">

            <div class="card-header">

                <h3 class="card-title">

                    <i class="ti ti-chart-pie me-2"></i>

                    Status Distribution

                </h3>

            </div>

            <div class="card-body">

                <canvas
                    id="status-chart"
                    height="300">

                </canvas>

            </div>

        </div>

    </div>

    <!-- Growth Trend -->
    <div class="col-lg-6">

        <div class="card h-100">

            <div class="card-header">

                <h3 class="card-title">

                    <i class="ti ti-chart-line me-2"></i>

                    Growth Trend

                </h3>

            </div>

            <div class="card-body">

                <canvas
                    id="growth-chart"
                    height="300">

                </canvas>

            </div>

        </div>

    </div>

</div>
