<!-- ===================================================== -->
<!-- SUMMARY STATISTICS -->
<!-- ===================================================== -->

<div class="row row-deck row-cards mb-4">

    <div class="col-sm-6 col-lg-3">

        <div class="card">

            <div class="card-body">

                <div class="d-flex align-items-center">

                    <div class="subheader">

                        Total Channels

                    </div>

                    <div class="ms-auto">

                        <span class="status-dot status-dot-animated bg-primary"></span>

                    </div>

                </div>

                <div
                    id="total-channels"
                    class="h1 mb-3">

                    {{ stats.total_channels|default(0) }}

                </div>

                <div class="d-flex mb-2">

                    <div>

                        Aktif

                    </div>

                    <div
                        id="active-channels"
                        class="ms-auto fw-bold">

                        {{ stats.active_channels|default(0) }}

                    </div>

                </div>

                <div class="progress progress-sm">

                    <div
                        id="channels-progress"
                        class="progress-bar bg-primary"
                        style="width:0%;">

                    </div>

                </div>

            </div>

        </div>

    </div>

    <div class="col-sm-6 col-lg-3">

        <div class="card">

            <div class="card-body">

                <div class="d-flex align-items-center">

                    <div class="subheader">

                        Total Artists

                    </div>

                    <div class="ms-auto">

                        <i class="ti ti-users text-success"></i>

                    </div>

                </div>

                <div
                    id="total-artists"
                    class="h1 mb-3">

                    {{ stats.total_artists|default(0) }}

                </div>

                <div class="text-muted">

                    Semua artist terdaftar

                </div>

            </div>

        </div>

    </div>

    <div class="col-sm-6 col-lg-3">

        <div class="card">

            <div class="card-body">

                <div class="d-flex align-items-center">

                    <div class="subheader">

                        Total Songs

                    </div>

                    <div class="ms-auto">

                        <i class="ti ti-music text-warning"></i>

                    </div>

                </div>

                <div
                    id="total-songs"
                    class="h1 mb-3">

                    {{ stats.total_songs|default(0) }}

                </div>

                <div class="text-muted">

                    Seluruh lagu

                </div>

            </div>

        </div>

    </div>

    <div class="col-sm-6 col-lg-3">

        <div class="card">

            <div class="card-body">

                <div class="d-flex align-items-center">

                    <div class="subheader">

                        Released

                    </div>

                    <div class="ms-auto">

                        <i class="ti ti-check text-green"></i>

                    </div>

                </div>

                <div
                    id="released-songs"
                    class="h1 mb-3">

                    {{ stats.released_songs|default(0) }}

                </div>

                <div
                    id="release-rate"
                    class="text-muted">

                    0%

                </div>

            </div>

        </div>

    </div>

</div>
