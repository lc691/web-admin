<!-- ===================================================== -->
<!-- BULK OPERATIONS HANDLER -->
<!-- ===================================================== -->

<script>

    function bulkDelete() {
        const selected = getSelectedIds();
        if (selected.length === 0) {
            showToast('Pilih minimal satu channel untuk dihapus', 'warning');
            return;
        }

        if (!confirm(`Yakin ingin menghapus ${selected.length} channel yang dipilih?`)) {
            return;
        }

        const modal = bootstrap.Modal.getInstance(document.getElementById('modal-bulk'));
        if (modal) {
            modal.hide();
        }

        showToast(`Menghapus ${selected.length} channel...`, 'info');

        fetch(`${API_BASE}/bulk/delete`, {
            method: 'POST',
            body: JSON.stringify({
                ids: selected,
                validate_existence: true
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                showToast(data.message || `${selected.length} channel berhasil dihapus`, 'success');
                refreshTable();
            } else {
                showToast(data.message || 'Gagal menghapus channel', 'error');
            }
        })
        .catch(err => {
            showToast('Gagal menghapus channel: ' + err.message, 'error');
        });
    }

    function bulkVermuk() {
        document.getElementById('modal-bulk').querySelector('.btn-close').click();
        // Show a sub-modal or prompt for action
        if (confirm('Set semua channel yang dipilih sebagai Vermuk?')) {
            bulkVermukSelected(true);
        }
    }

    function bulkVermukSelected(vermuk) {
        const selected = getSelectedIds();
        if (selected.length === 0) {
            showToast('Pilih minimal satu channel', 'warning');
            return;
        }

        const action = vermuk ? 'Vermuk' : 'Normal';
        showToast(`Mengupdate ${selected.length} channel ke ${action}...`, 'info');

        const modal = bootstrap.Modal.getInstance(document.getElementById('modal-bulk'));
        if (modal) {
            modal.hide();
        }

        fetch(`${API_BASE}/bulk/vermuk`, {
            method: 'POST',
            body: JSON.stringify({
                ids: selected,
                vermuk: vermuk,
                validate_existence: true
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                showToast(data.message || `${selected.length} channel berhasil diupdate`, 'success');
                refreshTable();
            } else {
                showToast(data.message || 'Gagal mengupdate channel', 'error');
            }
        })
        .catch(err => {
            showToast('Gagal mengupdate channel: ' + err.message, 'error');
        });
    }

    function bulkDeleteSelected() {
        document.getElementById('modal-bulk').querySelector('.btn-close').click();
        bulkDelete();
    }

</script>
