<script>
'use strict';

/* ==========================================================
 * Utilities
 * ========================================================== */

window.formatNumber = function(value) {

    return new Intl.NumberFormat('id-ID').format(
        Number(value || 0)
    );

};

window.formatPercentage = function(value, digits = 1) {

    return `${Number(value || 0).toFixed(digits)}%`;

};

window.formatDateTime = function(value) {

    if (!value) {
        return '-';
    }

    return new Date(value).toLocaleString('id-ID', {
        dateStyle: 'medium',
        timeStyle: 'short'
    });

};

window.setText = function(id, value) {

    const el = document.getElementById(id);

    if (!el) {
        return;
    }

    el.textContent = value;

};

window.setHTML = function(id, value) {

    const el = document.getElementById(id);

    if (!el) {
        return;
    }

    el.innerHTML = value;

};

window.setProgress = function(id, percent) {

    const el = document.getElementById(id);

    if (!el) {
        return;
    }

    el.style.width = `${percent}%`;

};

window.showLoading = function(id, message = 'Loading...') {

    const el = document.getElementById(id);

    if (!el) {
        return;
    }

    el.innerHTML = `
        <div class="text-center py-5 text-muted">
            <div class="spinner-border spinner-border-sm me-2"></div>
            ${message}
        </div>
    `;

};

window.showError = function(id, message = 'Failed to load data') {

    const el = document.getElementById(id);

    if (!el) {
        return;
    }

    el.innerHTML = `
        <div class="alert alert-danger m-3 mb-0">
            <i class="ti ti-alert-circle me-2"></i>
            ${message}
        </div>
    `;

};

/* ==========================================================
 * Toast
 * ========================================================== */

window.showToast = function(
    message,
    type = 'success',
    title = 'Notification'
) {

    if (window.Tabler?.showToast) {

        Tabler.showToast({
            type,
            title,
            message
        });

        return;
    }

    console.log(`[${type}] ${title}: ${message}`);

};

/* ==========================================================
 * Charts
 * ========================================================== */

window.destroyChart = function(chart) {

    if (chart && typeof chart.destroy === 'function') {
        chart.destroy();
    }

    return null;

};

window.createChart = function(id, config) {

    const canvas = document.getElementById(id);

    if (!canvas) {
        return null;
    }

    return new Chart(canvas, config);

};

/* ==========================================================
 * Fetch Helper
 * ========================================================== */

window.fetchJSON = async function(url) {

    const response = await fetch(url, {
        headers: {
            'X-Requested-With': 'XMLHttpRequest'
        }
    });

    if (!response.ok) {

        throw new Error(
            `HTTP ${response.status}`
        );

    }

    return await response.json();

};
</script>
