<!-- ===================================================== -->
<!-- DELETE HANDLER -->
<!-- ===================================================== -->

<script>

    function confirmDelete(channelId, channelName) {
        document.getElementById('delete-channel-id').value = channelId;
        document.getElementById('delete-channel-name').textContent = channelName;
        const modal = new bootstrap.Modal(document.getElementById('modal-delete'));
        modal.show();
    }

    function deleteChannel() {
        const channelId = document.getElementById('delete-channel-id').value;

        if (!channelId) {
            showToast('ID channel tidak valid', 'error');
            return;
        }

        const btn = document.getElementById('btn-confirm-delete');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="ti ti-spinner ti-spin me-1"></i> Menghapus...';

        fetch(`/api/channels/${channelId}`, {
            method: 'DELETE'
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                showToast(data.message || 'Channel berhasil dihapus', 'success');
                document.getElementById('modal-delete').querySelector('.btn-close').click();
                refreshTable();
            } else {
                showToast(data.message || 'Gagal menghapus channel', 'error');
            }
        })
        .catch(err => {
            showToast('Gagal menghapus channel: ' + err.message, 'error');
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerHTML = originalText;
        });
    }

    // Event listener untuk confirm delete
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('btn-confirm-delete').addEventListener('click', deleteChannel);
    });

</script>
