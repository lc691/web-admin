<!-- ===================================================== -->
<!-- DATATABLE CONFIGURATION -->
<!-- ===================================================== -->

<script>

    let channelsTable = null;

    function initDataTable() {
        channelsTable = $('#channels-table').DataTable({
            processing: true,
            serverSide: true,
            ajax: {
                url: "/api/channels/data",
                type: "GET",
                data: function(d) {
                    d.vermuk = $('#filter-vermuk').val();
                    d.has_songs = $('#filter-has-songs').val();
                    d.has_artists = $('#filter-has-artists').val();
                }
            },
            columns: [
                {
                    data: 'id',
                    render: function(data) {
                        return `
                            <input
                                type="checkbox"
                                class="form-check-input m-0 align-middle row-checkbox"
                                value="${data}"
                                onchange="updateBulkButtons()">
                        `;
                    },
                    orderable: false,
                    searchable: false
                },
                { data: 'id' },
                {
                    data: 'name',
                    render: function(data, type, row) {
                        return `<a href="/channels/${row.id}/detail" class="text-primary">${data}</a>`;
                    }
                },
                { data: 'email' },
                {
                    data: 'vermuk',
                    render: function(data) {
                        return data
                            ? '<span class="badge bg-danger text-white">Vermuk</span>'
                            : '<span class="badge bg-success text-white">Normal</span>';
                    }
                },
                {
                    data: 'total_artists',
                    className: 'text-center',
                    render: function(data) {
                        return formatNumber(data || 0);
                    }
                },
                {
                    data: 'total_songs',
                    className: 'text-center',
                    render: function(data) {
                        return formatNumber(data || 0);
                    }
                },
                {
                    data: 'uploaded_songs',
                    className: 'text-center',
                    render: function(data) {
                        return formatNumber(data || 0);
                    }
                },
                {
                    data: 'created_at',
                    render: function(data) {
                        return formatDate(data);
                    }
                },
                {
                    data: null,
                    orderable: false,
                    searchable: false,
                    render: function(data, type, row) {
                        return `
                            <div class="btn-group">
                                <a
                                    href="/channels/${row.id}"
                                    class="btn btn-sm btn-outline-secondary"
                                    title="Detail">
                                    <i class="ti ti-eye"></i>
                                </a>

                                <a
                                    href="/channels/${row.id}/edit"
                                    class="btn btn-sm btn-outline-primary"
                                    title="Edit">
                                    <i class="ti ti-edit"></i>
                                </a>

                                <button
                                    class="btn btn-sm btn-outline-danger"
                                    onclick="confirmDelete(${row.id}, '${row.name.replace(/'/g, "\\'")}')"
                                    title="Hapus">
                                    <i class="ti ti-trash"></i>
                                </button>
                            </div>
                        `;
                    }
                },
            ],
            order: [[1, 'asc']],
            pageLength: 10,
            lengthMenu: [10, 25, 50, 100],
            language: {
                processing: 'Memuat data...',
                search: 'Cari:',
                lengthMenu: 'Tampilkan _MENU_ data',
                info: 'Menampilkan _START_ sampai _END_ dari _TOTAL_ data',
                infoEmpty: 'Tidak ada data',
                infoFiltered: '(difilter dari _MAX_ total data)',
                zeroRecords: 'Tidak ada data yang ditemukan',
                paginate: {
                    first: 'Pertama',
                    last: 'Terakhir',
                    next: 'Selanjutnya',
                    previous: 'Sebelumnya'
                }
            },
            drawCallback: function() {
                updateBulkButtons();
            }
        });
    }

    function refreshTable() {
        if (channelsTable) {
            channelsTable.ajax.reload(null, false);
        }
        updateStatistics();
    }

    function applyFilters() {
        if (channelsTable) {
            channelsTable.ajax.reload(null, false);
        }
    }

    function resetFilters() {
        document.getElementById('search-keyword').value = '';
        document.getElementById('filter-vermuk').value = '';
        document.getElementById('filter-has-songs').value = '';
        document.getElementById('filter-has-artists').value = '';
        applyFilters();
    }

    function toggleAllCheckboxes() {
        const checked = document.getElementById('select-all').checked;
        document.querySelectorAll('.row-checkbox').forEach(cb => {
            cb.checked = checked;
        });
        updateBulkButtons();
    }

    function getSelectedIds() {
        const checkboxes = document.querySelectorAll('.row-checkbox:checked');
        return Array.from(checkboxes).map(cb => parseInt(cb.value));
    }

    function updateBulkButtons() {
        const selected = getSelectedIds();
        const count = selected.length;

        const deleteBtn = document.getElementById('btn-bulk-delete');
        const vermukBtn = document.getElementById('btn-bulk-vermuk');

        if (count > 0) {
            deleteBtn.classList.remove('d-none');
            vermukBtn.classList.remove('d-none');
            document.getElementById('bulk-selected-count').textContent = count;
        } else {
            deleteBtn.classList.add('d-none');
            vermukBtn.classList.add('d-none');
        }
    }

    function exportData(format) {
        const selected = getSelectedIds();
        if (selected.length === 0) {
            showToast('Pilih minimal satu channel untuk diexport', 'warning');
            return;
        }

        const url = `/api/channels/bulk/export?format=${format}&include_stats=true`;
        fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(selected)
        })
        .then(res => res.blob())
        .then(blob => {
            const downloadUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = `channels_export_${new Date().toISOString().split('T')[0]}.${format}`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(downloadUrl);
            showToast(`Berhasil mengeksport ${selected.length} channel`, 'success');
        })
        .catch(err => {
            showToast('Gagal mengeksport data: ' + err.message, 'error');
        });
    }

    function exportSelected() {
        document.getElementById('modal-bulk').querySelector('.btn-close').click();
        exportData('csv');
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
        initDataTable();
        updateStatistics();
    });

</script>
