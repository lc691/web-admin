<script>

document.addEventListener("DOMContentLoaded", () => {

    const container = document.getElementById("top-artists-container");

    if (!container) return;

    loadTopArtists();

    // =====================================================
    // LOAD
    // =====================================================

    async function loadTopArtists() {

        showLoading();

        try {

            const response = await fetch(
                "/api/channels/statistics/top-artists?channel_id={{ channel.id }}&limit=5"
            );

            const result = await response.json();

            if (!response.ok || !result.success) {

                showError();

                return;

            }

            if (!result.data || result.data.length === 0) {

                showEmpty();

                return;

            }

            renderTopArtists(result.data);

        } catch (error) {

            console.error(error);

            showError();

        }

    }

    // =====================================================
    // RENDER
    // =====================================================

    function renderTopArtists(artists) {

        let html = '<div class="list-group list-group-flush">';

        artists.forEach((artist, index) => {

            const medal =
                index === 0 ? "🥇" :
                index === 1 ? "🥈" :
                index === 2 ? "🥉" :
                `${index + 1}.`;

            html += `
                <div class="list-group-item">

                    <div class="d-flex align-items-center">

                        <div
                            class="text-muted fw-bold me-3"
                            style="width:32px">

                            ${medal}

                        </div>

                        <div class="flex-fill">

                            <div class="fw-semibold">

                                ${artist.name}

                            </div>

                            <div class="text-muted small">

                                ${artist.song_count ?? 0} Songs

                            </div>

                        </div>

                        <div class="text-end">

                            <div>

                                ${artist.uploaded ?? 0}

                            </div>

                            <small class="text-muted">

                                Uploaded

                            </small>

                        </div>

                    </div>

                </div>
            `;

        });

        html += "</div>";

        container.innerHTML = html;

    }

    // =====================================================
    // STATES
    // =====================================================

    function showLoading() {

        container.innerHTML = `
            <div class="text-center py-5 text-muted">

                <div class="spinner-border spinner-border-sm me-2"></div>

                Memuat artist...

            </div>
        `;

    }

    function showEmpty() {

        container.innerHTML = `
            <div class="text-center py-5 text-muted">

                <i class="ti ti-users fs-1 d-block mb-2"></i>

                Belum ada artist.

            </div>
        `;

    }

    function showError() {

        container.innerHTML = `
            <div class="text-center py-5 text-danger">

                <i class="ti ti-alert-circle fs-1 d-block mb-2"></i>

                Gagal memuat data artist.

            </div>
        `;

    }

});

</script>
