<!-- ===================================================== -->
<!-- PAGE HEADER -->
<!-- ===================================================== -->

<div class="page-header d-print-none mb-3">

    <div class="container-xl">

        <div class="row g-2 align-items-center">

            <div class="col">

                <div class="page-pretitle">

                    Music Management / Channels

                </div>

                <h2 class="page-title d-flex align-items-center">

                    <span
                        class="avatar avatar-lg me-3"
                        style="background-color: {{ channel.name|color_hash }};">

                        {{ channel.name[:1]|upper }}

                    </span>

                    <div>

                        <div class="d-flex align-items-center">

                            {{ channel.name }}

                            <span class="badge ms-2 bg-{{ 'danger text-white' if channel.vermuk else 'secondary text-white' }}">

                                {{ 'Vermuk' if channel.vermuk else 'Normal' }}

                            </span>

                        </div>

                        <div class="page-pretitle mt-1">

                            ID #{{ channel.id }}

                            {% if channel.email %}

                                • {{ channel.email }}

                            {% endif %}

                        </div>

                    </div>

                </h2>

            </div>

            <div class="col-auto ms-auto d-print-none">

                <div class="btn-list">

                    <a
                        href="/channels"
                        class="btn btn-outline-secondary">

                        <i class="ti ti-arrow-left me-1"></i>

                        Kembali

                    </a>

                    <a
                        href="/channels/{{ channel.id }}/edit"
                        class="btn btn-primary">

                        <i class="ti ti-edit me-1"></i>

                        Edit

                    </a>

                    <button
                        type="button"
                        class="btn btn-outline-danger"
                        onclick="confirmDelete({{ channel.id }}, {{ channel.name|tojson }})">

                        <i class="ti ti-trash me-1"></i>

                        Hapus

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>
