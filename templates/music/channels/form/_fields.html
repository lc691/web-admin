<!-- ===================================================== -->
<!-- FORM FIELDS -->
<!-- ===================================================== -->

<div class="row">

    <!-- =============================================== -->
    <!-- Nama Channel -->
    <!-- =============================================== -->

    <div class="col-md-6">

        <div class="mb-3">

            <label class="form-label required">
                Nama Channel
            </label>

            <input
                type="text"
                name="name"
                class="form-control"
                placeholder="Masukkan nama channel"
                value="{{ channel.name if channel else '' }}"
                required
                autofocus
                minlength="3"
                maxlength="255"
                autocomplete="off">

            <div class="form-hint">
                Nama channel harus unik dan minimal 3 karakter.
            </div>

        </div>

    </div>

    <!-- =============================================== -->
    <!-- Email -->
    <!-- =============================================== -->

    <div class="col-md-6">

        <div class="mb-3">

            <label class="form-label">
                Email
            </label>

            <input
                type="email"
                name="email"
                class="form-control"
                placeholder="channel@example.com"
                value="{{ channel.email if channel else '' }}"
                maxlength="255"
                autocomplete="email">

            <div class="form-hint">
                Email bersifat opsional dan harus unik jika diisi.
            </div>

        </div>

    </div>

    <!-- =============================================== -->
    <!-- Password -->
    <!-- =============================================== -->

    <div class="col-md-6">

        <div class="mb-3">

            <label class="form-label">
                Password
            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="{{ 'Kosongkan jika tidak diubah' if mode == 'edit' else 'Masukkan password' }}"
                minlength="6"
                maxlength="255"
                autocomplete="{{ 'off' if mode == 'edit' else 'new-password' }}">

            <div class="form-hint">
                Password minimal 6 karakter.
                <span class="text-muted">(Opsional)</span>
            </div>

        </div>

    </div>

    <!-- =============================================== -->
    <!-- Vermuk -->
    <!-- =============================================== -->

    <div class="col-md-6">

        <div class="mb-3">

            <label class="form-label">
                Status Vermuk
            </label>

            <div class="form-selectgroup">

                <label class="form-selectgroup-item">

                    <input
                        type="radio"
                        name="vermuk"
                        value="false"
                        class="form-selectgroup-input"
                        {{ 'checked' if channel is none or not channel.vermuk else '' }}>

                    <span class="form-selectgroup-label">
                        <i class="ti ti-circle-check me-1"></i>
                        Normal
                    </span>

                </label>

                <label class="form-selectgroup-item">

                    <input
                        type="radio"
                        name="vermuk"
                        value="true"
                        class="form-selectgroup-input"
                        {{ 'checked' if channel and channel.vermuk else '' }}>

                    <span class="form-selectgroup-label">
                        <i class="ti ti-alert-circle me-1 text-danger"></i>
                        Vermuk
                    </span>

                </label>

            </div>

            <div class="form-hint">
                Tandai jika channel memerlukan status Vermuk.
            </div>

        </div>

    </div>

    <!-- =============================================== -->
    <!-- Notes -->
    <!-- =============================================== -->

    <div class="col-12">

        <div class="mb-3">

            <label class="form-label">
                Catatan
            </label>

            <textarea
                name="notes"
                class="form-control"
                rows="5"
                maxlength="10000"
                placeholder="Tambahkan catatan untuk channel ini...">{{ channel.notes if channel else '' }}</textarea>

            <div class="form-hint">
                Maksimal 10.000 karakter.
            </div>

        </div>

    </div>

</div>
