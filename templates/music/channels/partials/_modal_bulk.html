<!-- ===================================================== -->
<!-- MODAL BULK OPERATIONS -->
<!-- ===================================================== -->

<div
    class="modal fade"
    id="modal-bulk"
    tabindex="-1"
    aria-hidden="true">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    <i class="ti ti-layers text-warning me-1"></i>

                    Operasi Massal

                </h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">

                </button>

            </div>

            <div class="modal-body">

                <div class="alert alert-info">

                    <i class="ti ti-info-circle me-1"></i>

                    Anda telah memilih

                    <strong id="bulk-selected-count">0</strong>

                    channel untuk operasi massal.

                </div>

                <div class="list-group">

                    <button
                        class="list-group-item list-group-item-action d-flex align-items-center"
                        onclick="bulkDeleteSelected()">

                        <i class="ti ti-trash text-danger me-2"></i>

                        <div>

                            <div class="fw-bold">Hapus Terpilih</div>

                            <div class="text-muted small">

                                Menghapus semua channel yang dipilih

                            </div>

                        </div>

                    </button>

                    <button
                        class="list-group-item list-group-item-action d-flex align-items-center"
                        onclick="bulkVermukSelected(true)">

                        <i class="ti ti-flag text-warning me-2"></i>

                        <div>

                            <div class="fw-bold">Set Vermuk</div>

                            <div class="text-muted small">

                                Menandai channel yang dipilih sebagai Vermuk

                            </div>

                        </div>

                    </button>

                    <button
                        class="list-group-item list-group-item-action d-flex align-items-center"
                        onclick="bulkVermukSelected(false)">

                        <i class="ti ti-flag-off text-secondary me-2"></i>

                        <div>

                            <div class="fw-bold">Set Normal</div>

                            <div class="text-muted small">

                                Menandai channel yang dipilih sebagai Normal

                            </div>

                        </div>

                    </button>

                    <button
                        class="list-group-item list-group-item-action d-flex align-items-center"
                        onclick="exportSelected()">

                        <i class="ti ti-file-export text-success me-2"></i>

                        <div>

                            <div class="fw-bold">Export Terpilih</div>

                            <div class="text-muted small">

                                Mengekspor data channel yang dipilih

                            </div>

                        </div>

                    </button>

                </div>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Tutup

                </button>

            </div>

        </div>

    </div>

</div>
