<!-- ===================================================== -->
<!-- MODAL DELETE -->
<!-- ===================================================== -->

<div
    class="modal fade"
    id="modal-delete"
    tabindex="-1"
    aria-hidden="true">

    <div class="modal-dialog modal-sm modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    <i class="ti ti-alert-triangle text-danger me-1"></i>

                    Konfirmasi Hapus

                </h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">

                </button>

            </div>

            <div class="modal-body">

                <p>

                    Apakah Anda yakin ingin menghapus channel

                    <strong id="delete-channel-name"></strong>?

                </p>

                <p class="text-muted small">

                    <i class="ti ti-info-circle me-1"></i>

                    Tindakan ini akan menghapus semua artist dan lagu yang terkait dengan channel ini.

                </p>

                <input
                    type="hidden"
                    id="delete-channel-id">

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Batal

                </button>

                <button
                    id="btn-confirm-delete"
                    class="btn btn-danger">

                    <i class="ti ti-trash me-1"></i>

                    Hapus

                </button>

            </div>

        </div>

    </div>

</div>
