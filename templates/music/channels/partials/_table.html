<!-- ===================================================== -->
<!-- TABLE -->
<!-- ===================================================== -->

<div class="table-responsive">

    <table
        id="channels-table"
        class="table table-hover table-vcenter card-table w-100">

        <thead>

            <tr>

                <th width="40">

                    <input
                        id="check-all"
                        class="form-check-input"
                        type="checkbox">

                </th>

                <th width="70">
                    ID
                </th>

                <th>
                    Channel
                </th>

                <th>
                    Email
                </th>

                <th width="90" class="text-center">
                    Artists
                </th>

                <th width="90" class="text-center">
                    Songs
                </th>

                <th width="100" class="text-center">
                    Status
                </th>

                <th width="180">
                    Updated
                </th>

                <th width="140" class="text-center">
                    Action
                </th>

            </tr>

        </thead>

        <tbody></tbody>

    </table>

</div>

<!-- ===================================================== -->
<!-- BULK TOOLBAR -->
<!-- ===================================================== -->

<div
    id="bulk-toolbar"
    class="card mt-3 d-none">

    <div class="card-body py-2">

        <div class="d-flex align-items-center">

            <strong>

                <span id="selected-count">0</span>

                dipilih

            </strong>

            <div class="ms-auto btn-list">

                <button
                    id="btn-bulk-vermuk"
                    type="button"
                    class="btn btn-warning">

                    <i class="ti ti-shield-check me-1"></i>

                    Vermuk

                </button>

                <button
                    id="btn-bulk-delete"
                    type="button"
                    class="btn btn-danger">

                    <i class="ti ti-trash me-1"></i>

                    Hapus

                </button>

            </div>

        </div>

    </div>

</div>
