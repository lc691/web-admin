<!doctype html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{% block meta_description %}DramaStream Admin{% endblock %}">
    <meta name="author" content="DramaStream">

    <title>{% block title %}Dashboard{% endblock %} • DramaStream Admin</title>

    <!-- ===================================================== -->
    <!-- Favicon -->
    <!-- ===================================================== -->
    <link rel="icon" href="{{ url_for('static', path='favicon.ico') }}">

    <!-- ===================================================== -->
    <!-- Material Symbols - for Nepal Sidebar Icons            -->
    <!-- ===================================================== -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

    <!-- ===================================================== -->
    <!-- Google Fonts (Poppins) - for Nepal Sidebar            -->
    <!-- ===================================================== -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- ===================================================== -->
    <!-- Tabler UI (untuk konten utama)                       -->
    <!-- ===================================================== -->
    <link rel="stylesheet" href="{{ url_for('static', path='tabler/css/tabler.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='vendor/datatables/css/dataTables.dataTables.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='tabler/icons/tabler-icons.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='fontawesome/css/all.min.css') }}">

    <!-- ===================================================== -->
    <!-- Plugins                                               -->
    <!-- ===================================================== -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css">

    <!-- ===================================================== -->
    <!-- Custom CSS                                            -->
    <!-- ===================================================== -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/navbar.css') }}">
    
    <!-- ===================================================== -->
    <!-- SIDEBAR NEPAL - CSS (NEW!)                           -->
    <!-- ===================================================== -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/sidebar.css') }}">

    <!-- ===================================================== -->
    <!-- Custom Dashboard CSS (opsional)                       -->
    <!-- ===================================================== -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/dashboard.css') }}">

    {% block extra_styles %}{% endblock %}
</head>

<body>

    <!-- ===================================================== -->
    <!-- MOBILE NAVBAR (hanya muncul di mobile)                -->
    <!-- ===================================================== -->
    <nav class="site-nav" aria-label="Mobile Navigation">
        <button class="sidebar-toggle" aria-label="Toggle Sidebar">
            <span class="material-symbols-rounded">menu</span>
        </button>
    </nav>

    <!-- ===================================================== -->
    <!-- MAIN CONTAINER                                        -->
    <!-- ===================================================== -->
    <div class="sidebar-container">

        <!-- ===================================================== -->
        <!-- SIDEBAR - Nepal Style (NEW!)                         -->
        <!-- ===================================================== -->
        {% include "partials/sidebar.html" %}

        <!-- ===================================================== -->
        <!-- PAGE WRAPPER                                         -->
        <!-- ===================================================== -->
        <div class="page-wrapper" style="flex: 1; display: flex; flex-direction: column; min-height: 100vh;">

            <!-- Navbar (Tabler style - untuk user profile, notifications, dll) -->
            {% include "partials/navbar.html" %}

            <!-- Page Body -->
            <div class="page-body" style="flex: 1; padding: 20px 0;">

                <div class="container-xl">

                    {% block content %}
                    {% endblock %}

                </div>

            </div>

            <!-- Footer -->
            {% include "partials/footer.html" %}

        </div>

    </div>

    <!-- ========================================================= -->
    <!-- VENDOR SCRIPTS                                           -->
    <!-- ========================================================= -->
    <script src="{{ url_for('static', path='bootstrap/js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', path='fontawesome/js/all.min.js') }}"></script>
    <script src="{{ url_for('static', path='vendor/htmx/htmx.min.js') }}"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{{ url_for('static', path='vendor/datatables/js/dataTables.min.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- ========================================================= -->
    <!-- SIDEBAR NEPAL - JavaScript (NEW!)                        -->
    <!-- ========================================================= -->
    <script src="{{ url_for('static', path='js/sidebar.js') }}"></script>

    <!-- ========================================================= -->
    <!-- CUSTOM SCRIPTS                                           -->
    <!-- ========================================================= -->
    <script src="/static/js/dashboard.js"></script>
    <script src="/static/js/navbar.js"></script>
    <script src="/static/js/charts.js"></script>

    {% block scripts %}{% endblock %}

</body>

</html>
