{% extends "base.html" %}
{% block content %}

<h1 class="h3 mb-2 text-gray-800">Edit Required Channel</h1>

<div class="card shadow mb-4">
  <div class="card-body">

    <form method="post">

      <div class="form-group">
        <label>ID</label>
        <input type="text"
               class="form-control"
               value="{{ channel.id }}"
               disabled>
      </div>

      <div class="form-group">
        <label>Channel Username</label>
        <input type="text"
               name="username"
               class="form-control"
               value="{{ channel.username }}"
               required>
        <small class="form-text text-muted">
          Tanpa @, minimal 5 karakter.
        </small>
      </div>

      <div class="form-group">
        <label>Bot Username</label>
        <input type="text"
               class="form-control"
               value="{{ channel.bot_username }}"
               disabled>
        <small class="form-text text-muted">
          Bot username tidak bisa diubah.
        </small>
      </div>

      <div class="form-group form-check">
        <input type="checkbox"
               class="form-check-input"
               name="is_active"
               value="true"
               {% if channel.is_active %}checked{% endif %}>
        <label class="form-check-label">Active</label>
      </div>

      <button type="submit" class="btn btn-primary">
        <i class="fas fa-save mr-1"></i> Simpan Perubahan
      </button>

      <a href="/required-channels/" class="btn btn-secondary">
        Batal
      </a>

    </form>

  </div>
</div>

{% endblock %}
