{% extends "base.html" %}

{% block content %}

<div class="container-fluid px-4" style="max-width: 600px;">
    
    <!-- ========================================================== -->
    <!-- HEADER                                                      -->
    <!-- ========================================================== -->
    <div class="d-flex justify-content-between align-items-center flex-wrap mb-4">
        <div>
            <h1 class="h3 mb-0 text-gray-800">
                <i class="fas fa-user-edit me-2 text-warning"></i>
                Edit Admin
            </h1>
            <small class="text-muted">Perbarui informasi admin</small>
        </div>
        <a href="/admins" class="btn btn-secondary btn-sm">
            <i class="fas fa-arrow-left me-1"></i>
            Kembali
        </a>
    </div>

    <!-- ========================================================== -->
    <!-- FORM                                                       -->
    <!-- ========================================================== -->
    <div class="card shadow-sm">
        <div class="card-header">
            <h6 class="mb-0 fw-bold text-primary">
                <i class="fas fa-user-cog me-2"></i>
                Informasi Admin
            </h6>
        </div>
        <div class="card-body">
            <form method="post" action="/admins/edit/{{ admin.user_id }}">
                
                <div class="mb-3">
                    <label class="form-label fw-bold">
                        <i class="fas fa-id-badge me-1"></i>
                        User ID
                    </label>
                    <input type="text" 
                           class="form-control" 
                           value="{{ admin.user_id }}" 
                           disabled>
                    <small class="text-muted">User ID tidak dapat diubah</small>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">
                        <i class="fas fa-user me-1"></i>
                        First Name <span class="text-danger">*</span>
                    </label>
                    <input type="text" 
                           name="first_name" 
                           class="form-control" 
                           value="{{ admin.first_name }}" 
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">
                        <i class="fas fa-at me-1"></i>
                        Username <span class="text-danger">*</span>
                    </label>
                    <input type="text" 
                           name="username" 
                           class="form-control" 
                           value="{{ admin.username }}" 
                           required>
                    <small class="text-muted">
                        Tanpa @, username Telegram
                    </small>
                </div>

                <div class="d-flex gap-2 pt-3 border-top">
                    <a href="/admins" class="btn btn-secondary">
                        <i class="fas fa-times me-1"></i>
                        Batal
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-1"></i>
                        Simpan Perubahan
                    </button>
                </div>

            </form>
        </div>
    </div>

</div>

{% endblock %}
