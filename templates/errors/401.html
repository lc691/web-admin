{% extends "base.html" %}

{% block title %}
401 - Tidak Terautentikasi
{% endblock %}

{% block content %}

<div class="container-xl d-flex flex-column justify-content-center align-items-center" style="min-height: 70vh;">

    <div class="text-center">

        <div class="display-1 text-warning mb-3">401</div>

        <div class="h1 mb-3">Tidak Terautentikasi</div>

        <p class="text-muted mb-4">
            Maaf, Anda harus login terlebih dahulu untuk mengakses halaman ini.
            {% if message %}
                <br><span class="text-warning">{{ message }}</span>
            {% endif %}
        </p>

        <div class="d-flex gap-3 justify-content-center">

            <a href="/login" class="btn btn-primary">

                <i class="ti ti-login me-1"></i>

                Login

            </a>

            <a href="/" class="btn btn-outline-secondary">

                <i class="ti ti-home me-1"></i>

                Ke Dashboard

            </a>

        </div>

    </div>

</div>

{% endblock %}
