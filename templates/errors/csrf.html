{% extends "base.html" %}

{% block title %}
CSRF - Keamanan
{% endblock %}

{% block content %}

<div class="container-xl d-flex flex-column justify-content-center align-items-center" style="min-height: 70vh;">

    <div class="text-center">

        <div class="display-1 text-danger mb-3">
            <i class="ti ti-shield-lock"></i>
        </div>

        <div class="h1 mb-3">Keamanan CSRF</div>

        <p class="text-muted mb-4">
            Maaf, token keamanan tidak valid atau telah kadaluwarsa. Silakan refresh halaman dan coba lagi.
            {% if message %}
                <br><span class="text-danger">{{ message }}</span>
            {% endif %}
        </p>

        <div class="d-flex gap-3 justify-content-center">

            <a href="javascript:location.reload()" class="btn btn-outline-secondary">

                <i class="ti ti-refresh me-1"></i>

                Refresh Halaman

            </a>

            <a href="/" class="btn btn-primary">

                <i class="ti ti-home me-1"></i>

                Ke Dashboard

            </a>

        </div>

    </div>

</div>

{% endblock %}
