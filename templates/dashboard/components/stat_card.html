{% macro stat_card(title, value, icon, color, subtitle, subtitle_icon, bg_color) %}
<div class="col-xl-3 col-md-6 mb-4">
    <div class="card border-left-{{ color }} shadow h-100 py-3">
        <div class="card-body">
            <div class="row no-gutters align-items-center">
                <div class="col mr-2">
                    <div class="text-xs font-weight-bold text-{{ color }} text-uppercase mb-1">
                        <i class="fas fa-{{ icon }} me-1"></i> {{ title }}
                    </div>
                    <div class="h5 mb-0 font-weight-bold text-gray-800 count-up stat-value" 
                         data-stat="{{ title|lower|replace(' ', '_') }}">
                        {{ value }}
                    </div>
                    {% if subtitle %}
                    <div class="small text-{{ subtitle_icon|default('success') }} mt-1">
                        <i class="fas fa-{{ subtitle_icon|default('plus-circle') }}"></i> 
                        {{ subtitle }}
                    </div>
                    {% endif %}
                </div>
                <div class="col-auto">
                    <div class="stat-icon-bg" style="background: rgba({{ bg_color }}, 0.1);">
                        <i class="fas fa-{{ icon }} fa-2x text-{{ color }}"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endmacro %}
