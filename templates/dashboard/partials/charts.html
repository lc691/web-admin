<div class="row">
    <!-- VIP Users Trend Chart -->
    <div class="col-xl-8 col-lg-7 mb-4">
        <div class="card shadow">
            <div class="card-header py-3 d-flex flex-row align-items-center justify-content-between">
                <h6 class="m-0 font-weight-bold text-primary">
                    <i class="fas fa-chart-line me-1"></i> VIP Users Trend
                </h6>
                <div class="dropdown no-arrow">
                    <select id="chartPeriod" class="form-control form-control-sm" style="width: auto;">
                        <option value="7">Last 7 Days</option>
                        <option value="30" selected>Last 30 Days</option>
                        <option value="90">Last 90 Days</option>
                    </select>
                </div>
            </div>
            <div class="card-body">
                <div class="chart-container">
                    <canvas id="vipUsersChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Revenue Distribution -->
    <div class="col-xl-4 col-lg-5 mb-4">
        <div class="card shadow">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">
                    <i class="fas fa-chart-pie me-1"></i> Revenue Distribution
                </h6>
            </div>
            <div class="card-body">
                <div class="chart-container">
                    <canvas id="revenuePieChart"></canvas>
                </div>
                <div class="mt-4">
                    {% set colors = ['primary', 'success', 'warning'] %}
                    {% set labels = ['VIP Packages', 'Donations', 'Vouchers'] %}
                    {% for i in range(3) %}
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span><i class="fas fa-circle text-{{ colors[i] }}"></i> {{ labels[i] }}</span>
                        <span class="font-weight-bold">
                            Rp {{ "{:,.0f}".format(revenue_distribution[i]|default(0)).replace(',', '.') }}
                        </span>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</div>
