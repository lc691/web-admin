<div class="row g-3 mb-4">

    <!-- ====================================================== -->
    <!-- Total -->
    <!-- ====================================================== -->
    <div class="col-sm-6 col-lg-3">
        <div class="card border-left-primary shadow-sm h-100">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <div class="text-xs fw-bold text-primary text-uppercase">Total Songs</div>
                        <div id="stat-total" class="h1 mb-0 fw-bold text-gray-800 mt-1">
                            {{ statistics.total }}
                        </div>
                    </div>
                    <div class="text-primary">
                        <i class="fas fa-music fa-2x opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ====================================================== -->
    <!-- Live -->
    <!-- ====================================================== -->
    <div class="col-sm-6 col-lg-3">
        <div class="card border-left-success shadow-sm h-100">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <div class="text-xs fw-bold text-success text-uppercase">Live</div>
                        <div id="stat-live" class="h1 mb-0 fw-bold text-gray-800 mt-1">
                            {{ statistics.live }}
                        </div>
                    </div>
                    <div class="text-success">
                        <i class="fas fa-play-circle fa-2x opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ====================================================== -->
    <!-- Review -->
    <!-- ====================================================== -->
    <div class="col-sm-6 col-lg-3">
        <div class="card border-left-warning shadow-sm h-100">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <div class="text-xs fw-bold text-warning text-uppercase">Review</div>
                        <div id="stat-review" class="h1 mb-0 fw-bold text-gray-800 mt-1">
                            {{ statistics.review }}
                        </div>
                    </div>
                    <div class="text-warning">
                        <i class="fas fa-clock fa-2x opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ====================================================== -->
    <!-- Approved -->
    <!-- ====================================================== -->
    <div class="col-sm-6 col-lg-3">
        <div class="card border-left-primary shadow-sm h-100">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <div class="text-xs fw-bold text-primary text-uppercase">Approved</div>
                        <div id="stat-approved" class="h1 mb-0 fw-bold text-gray-800 mt-1">
                            {{ statistics.approved }}
                        </div>
                    </div>
                    <div class="text-primary">
                        <i class="fas fa-check-circle fa-2x opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
