<div class="d-flex flex-wrap gap-2 mb-4 align-items-center">

    <!-- ================================================== -->
    <!-- Left -->
    <!-- ================================================== -->
    <div class="d-flex flex-wrap gap-2">
        <button id="btn-create" class="btn btn-success btn-sm" type="button">
            <i class="fas fa-plus me-1"></i>
            Add Song
        </button>

        <button id="btn-import" class="btn btn-info btn-sm" type="button">
            <i class="fas fa-file-import me-1"></i>
            Import
        </button>

        <button id="btn-export" class="btn btn-primary btn-sm" type="button">
            <i class="fas fa-file-export me-1"></i>
            Export
        </button>

        <button id="btn-usage" class="btn btn-warning btn-sm" type="button">
            <i class="fas fa-file-invoice me-1"></i>
            Usage
        </button>
    </div>

    <!-- ================================================== -->
    <!-- Right -->
    <!-- ================================================== -->
    <div class="d-flex flex-wrap gap-2 ms-auto">
        <button id="btn-bulk-status" class="btn btn-outline-warning btn-sm" type="button" disabled>
            <i class="fas fa-edit me-1"></i>
            Bulk Status
        </button>

        <button id="btn-bulk-artist" class="btn btn-outline-info btn-sm" type="button" disabled>
            <i class="fas fa-user me-1"></i>
            Bulk Artist
        </button>

        <button id="btn-bulk-release" class="btn btn-outline-secondary btn-sm" type="button" disabled>
            <i class="fas fa-calendar-alt me-1"></i>
            Bulk Release
        </button>

        <button id="btn-bulk-delete" class="btn btn-outline-danger btn-sm" type="button" disabled>
            <i class="fas fa-trash me-1"></i>
            Bulk Delete
        </button>

        <button id="btn-refresh" class="btn btn-outline-secondary btn-sm" type="button">
            <i class="fas fa-sync-alt me-1"></i>
            Refresh
        </button>
    </div>

</div>
