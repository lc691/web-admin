<div class="card shadow-sm">

    <div class="card-header">
        <div class="d-flex justify-content-between align-items-center w-100">
            <h6 class="mb-0 fw-bold text-primary">
                <i class="fas fa-list me-2"></i> Songs
            </h6>
            <div id="selected-counter" class="text-muted small">
                0 selected
            </div>
        </div>
    </div>
    
    <div class="card-body p-3">
        <div class="table-responsive">
            <table 
                id="songs-table" 
                class="table table-hover table-striped align-middle">
                
                <thead class="table-light">
                    <tr>
                        <th class="w-1" style="width:40px;">
                            <input id="check-all" class="form-check-input" type="checkbox">
                        </th>
                        <th style="width:80px;">ID</th>
                        <th>Title</th>
                        <th style="width:220px;">Artist</th>
                        <th style="width:180px;">Channel</th>
                        <th class="text-center" style="width:120px;">Status</th>
                        <th style="width:130px;">Release Date</th>
                        <th class="text-end" style="width:150px;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {# Filled by DataTables AJAX #}
                </tbody>
            </table>
        </div>
    </div>

    <div class="card-footer">
        <div class="d-flex justify-content-between align-items-center">
            <div id="table-information" class="text-muted small">
                <i class="fas fa-info-circle me-1"></i> Ready
            </div>
            <div id="datatable-pagination">
                {# DataTables pagination #}
            </div>
        </div>
    </div>

</div>
