<form
    id="edit-song-form"
    autocomplete="off"
>

    <input
        id="edit-song-id"
        name="id"
        type="hidden"
    >

    <div class="row">

        <!-- ====================================================== -->
        <!-- Title -->
        <!-- ====================================================== -->

        <div class="col-md-12">

            <div class="mb-3">

                <label
                    class="form-label"
                    for="edit-song-title"
                >
                    Title
                </label>

                <input
                    id="edit-song-title"
                    name="title"
                    class="form-control"
                    type="text"
                    maxlength="255"
                    required
                >

            </div>

        </div>

        <!-- ====================================================== -->
        <!-- Channel -->
        <!-- ====================================================== -->

        <div class="col-md-6">

            <div class="mb-3">

                <label
                    class="form-label"
                    for="edit-channel-id"
                >
                    Channel
                </label>

                <select
                    id="edit-channel-id"
                    name="channel_id"
                    class="form-select"
                >

                    <option value="">
                        Select Channel
                    </option>

                    {% for channel in channels %}

                    <option value="{{ channel.id }}">
                        {{ channel.name }}
                    </option>

                    {% endfor %}

                </select>

            </div>

        </div>

        <!-- ====================================================== -->
        <!-- Artist -->
        <!-- ====================================================== -->

        <div class="col-md-6">

            <div class="mb-3">

                <label
                    class="form-label"
                    for="edit-artist-id"
                >
                    Artist
                </label>

                <select
                    id="edit-artist-id"
                    name="artist_id"
                    class="form-select"
                    required
                >

                    <option value="">
                        Select Artist
                    </option>

                    {% for artist in artists %}

                    <option
                        value="{{ artist.id }}"
                        data-channel="{{ artist.channel_id }}"
                    >
                        {{ artist.name }}
                    </option>

                    {% endfor %}

                </select>

            </div>

        </div>

        <!-- ====================================================== -->
        <!-- Status -->
        <!-- ====================================================== -->

        <div class="col-md-6">

            <div class="mb-3">

                <label
                    class="form-label"
                    for="edit-song-status"
                >
                    Status
                </label>

                <select
                    id="edit-song-status"
                    name="status"
                    class="form-select"
                    required
                >

                    {% for status in statuses %}

                    <option value="{{ status.value }}">
                        {{ status.label }}
                    </option>

                    {% endfor %}

                </select>

            </div>

        </div>

        <!-- ====================================================== -->
        <!-- Release Date -->
        <!-- ====================================================== -->

        <div class="col-md-6">

            <div class="mb-3">

                <label
                    class="form-label"
                    for="edit-release-date"
                >
                    Release Date
                </label>

                <input
                    id="edit-release-date"
                    name="release_date"
                    class="form-control"
                    type="date"
                >

            </div>

        </div>

    </div>

</form>
