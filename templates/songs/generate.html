<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<script>
    (function() {
        // ============================================================
        // 🔧 BAGIAN YANG BISA ANDA TAMBAH SENDIRI
        // ============================================================
                    
        function parseLine(line) {
            line = line.trim();
            if (line === "") return null;

            // ==========================================
            // FORMAT KHUSUS: nomor.🇺🇸JUDUL : judul ( artis )
            // Contoh: 41.🇺🇸 JUDUL : It Doesn't Feel Like Freedom ( Elizabeth Dickson )
            //         43.🇺🇸JUDUL:Bola mania di kandang(Kirty Amoni)
            // ==========================================
            let usJudulParenMatch = line.match(/^(\d+)\.\s*🇺🇸\s*JUDUL\s*:\s*(.*)$/i);
            if (usJudulParenMatch) {
                let fullText = usJudulParenMatch[2].trim();
                
                // Cari pola ( artis ) di akhir
                let parenMatch = fullText.match(/^(.*?)\s*\(\s*(.*?)\s*\)\s*$/);
                if (parenMatch) {
                    let title = parenMatch[1].trim();
                    let artist = parenMatch[2].trim();
                    return {
                        number: usJudulParenMatch[1],
                        title: title,
                        artist: artist,
                        queryOnlyTitle: false,
                        displayTemplate: `${usJudulParenMatch[1]}. ${title} ${artist}`
                    };
                }
                
                // Kalau tidak ada tanda kurung, cari '-' sebagai pemisah
                let lastDashIndex = fullText.lastIndexOf(' - ');
                if (lastDashIndex !== -1) {
                    let title = fullText.substring(0, lastDashIndex).trim();
                    let artist = fullText.substring(lastDashIndex + 3).trim();
                    return {
                        number: usJudulParenMatch[1],
                        title: title,
                        artist: artist,
                        queryOnlyTitle: false,
                        displayTemplate: `${usJudulParenMatch[1]}. ${title} ${artist}`
                    };
                }
                
                // Kalau tidak ada tanda kurung dan tidak ada '-', ambil kata terakhir sebagai artis
                let words = fullText.split(' ');
                if (words.length > 1) {
                    let artist = words[words.length - 1];
                    let title = words.slice(0, -1).join(' ');
                    return {
                        number: usJudulParenMatch[1],
                        title: title,
                        artist: artist,
                        queryOnlyTitle: false,
                        displayTemplate: `${usJudulParenMatch[1]}. ${title} ${artist}`
                    };
                }
                
                return {
                    number: usJudulParenMatch[1],
                    title: fullText,
                    artist: null,
                    queryOnlyTitle: false,
                    displayTemplate: `${usJudulParenMatch[1]}. ${fullText}`
                };
            }

            // ==========================================
            // FORMAT 1: nomor.Judul : judul - artis (PRIORITAS TERTINGGI)
            // ==========================================
            let judulSpasiMatch = line.match(/^(\d+)\.\s*Judul\s*:\s*(.*)$/i);
            if (judulSpasiMatch) {
                let fullText = judulSpasiMatch[2].trim();
                
                let lastDashIndex = fullText.lastIndexOf(' - ');
                if (lastDashIndex !== -1) {
                    let title = fullText.substring(0, lastDashIndex).trim();
                    let artist = fullText.substring(lastDashIndex + 3).trim();
                    return {
                        number: judulSpasiMatch[1],
                        title: title,
                        artist: artist,
                        queryOnlyTitle: false
                    };
                }
                
                let words = fullText.split(' ');
                if (words.length > 1) {
                    let artist = words[words.length - 1];
                    let title = words.slice(0, -1).join(' ');
                    return {
                        number: judulSpasiMatch[1],
                        title: title,
                        artist: artist,
                        queryOnlyTitle: false
                    };
                }
                
                return {
                    number: judulSpasiMatch[1],
                    title: fullText,
                    artist: null,
                    queryOnlyTitle: false
                };
            }

            // ==========================================
            // FORMAT 2: nomor.JUDUL: judul - artis (HURUF BESAR)
            // ==========================================
            let judulMatch = line.match(/^(\d+)\.\s*JUDUL:\s*(.*)$/i);
            if (judulMatch) {
                let fullText = judulMatch[2].trim();
                
                let lastDashIndex = fullText.lastIndexOf(' - ');
                if (lastDashIndex !== -1) {
                    let title = fullText.substring(0, lastDashIndex).trim();
                    let artist = fullText.substring(lastDashIndex + 3).trim();
                    return {
                        number: judulMatch[1],
                        title: title,
                        artist: artist,
                        queryOnlyTitle: false
                    };
                }
                
                return {
                    number: judulMatch[1],
                    title: fullText,
                    artist: null,
                    queryOnlyTitle: false
                };
            }

            // ==========================================
            // FORMAT 3: nomor. 🇺🇲 Judul: binary signal vrelex colix
            // ==========================================
            let usMatch = line.match(/^(\d+)\.\s*🇺🇲\s*Judul:\s*(.*)$/i);
            if (usMatch) {
                let fullText = usMatch[2].trim();
                let words = fullText.split(' ');
                let judul = words.slice(0, -1).join(' ');
                let artis = words[words.length - 1];
                
                return { 
                    number: usMatch[1], 
                    title: judul,
                    fullTitle: fullText,
                    artist: artis,
                    queryOnlyTitle: true,
                    displayTemplate: `${usMatch[1]}. 🇺🇲 Judul: ${fullText}`
                };
            }

            // ==========================================
            // FORMAT 4: nomor .judul artis
            // ==========================================
            let spasiTitikMatch = line.match(/^(\d+)\s*\.\s*(.+)$/);
            if (spasiTitikMatch) {
                let fullText = spasiTitikMatch[2].trim();
                
                let lastDashIndex = fullText.lastIndexOf(' - ');
                if (lastDashIndex !== -1) {
                    let title = fullText.substring(0, lastDashIndex).trim();
                    let artist = fullText.substring(lastDashIndex + 3).trim();
                    return {
                        number: spasiTitikMatch[1],
                        title: title,
                        artist: artist,
                        queryOnlyTitle: false
                    };
                }
                
                let words = fullText.split(' ');
                if (words.length > 1) {
                    let artist = words[words.length - 1];
                    let title = words.slice(0, -1).join(' ');
                    return {
                        number: spasiTitikMatch[1],
                        title: title,
                        artist: artist,
                        queryOnlyTitle: false
                    };
                }
                
                return {
                    number: spasiTitikMatch[1],
                    title: fullText,
                    artist: null,
                    queryOnlyTitle: false
                };
            }

            // ==========================================
            // FORMAT 5: nomor💥 judul - artis atau nomor🍄 judul - artis
            // ==========================================
            let emojiMatch = line.match(/^(\d+)\s*[💥🍄]\s*(.*)$/);
            if (emojiMatch) {
                let judulArtis = emojiMatch[2].trim();
                let artistMatch = judulArtis.match(/^(.*?)\s*-\s*(.*)$/);
                if (artistMatch) {
                    return { number: emojiMatch[1], title: artistMatch[1].trim(), artist: artistMatch[2].trim() };
                }
                return { number: emojiMatch[1], title: judulArtis, artist: null };
            }

            // ==========================================
            // FORMAT 6: nomor~judul artis
            // ==========================================
            if (line.includes('~')) {
                let parts = line.split('~');
                let titlePart = parts[1].trim();
                let artistMatch = titlePart.match(/^(.*?)\s+([A-Z][a-z]+(?:\s+[A-Z][a-z]+)*)$/);
                if (artistMatch) {
                    return { number: parts[0].trim(), title: artistMatch[1].trim(), artist: artistMatch[2].trim() };
                }
                return { number: parts[0].trim(), title: titlePart, artist: null };
            }

            // ==========================================
            // FORMAT 7: nomor. judul
            // ==========================================
            let dotMatch = line.match(/^(\d+)\.\s+(.*)$/);
            if (dotMatch) {
                let fullText = dotMatch[2].trim();
                let lastDashIndex = fullText.lastIndexOf(' - ');
                if (lastDashIndex !== -1) {
                    let title = fullText.substring(0, lastDashIndex).trim();
                    let artist = fullText.substring(lastDashIndex + 3).trim();
                    return {
                        number: dotMatch[1],
                        title: title,
                        artist: artist,
                        queryOnlyTitle: false
                    };
                }
                return { number: dotMatch[1], title: fullText, artist: null };
            }

            // ==========================================
            // FORMAT 8: nomor langsung diikuti teks
            // ==========================================
            let noSpaceMatch = line.match(/^(\d+)\.(.+)$/);
            if (noSpaceMatch) {
                let fullText = noSpaceMatch[2].trim();
                let lastDashIndex = fullText.lastIndexOf(' - ');
                if (lastDashIndex !== -1) {
                    let title = fullText.substring(0, lastDashIndex).trim();
                    let artist = fullText.substring(lastDashIndex + 3).trim();
                    return {
                        number: noSpaceMatch[1],
                        title: title,
                        artist: artist,
                        queryOnlyTitle: false
                    };
                }
                return { 
                    number: noSpaceMatch[1], 
                    title: fullText,
                    artist: null 
                };
            }

            // ==========================================
            // FORMAT 9: JUDUL ⭐ teks
            // ==========================================
            if (line.startsWith('JUDUL')) {
                let title = line.replace(/JUDUL\s*[⭐*]?\s*/, '').trim();
                return { number: null, title: title, artist: null };
            }

            // ==========================================
            // FORMAT 10: nomor Judul : teks
            // ==========================================
            let judulSingleMatch = line.match(/^(\d+)\s+Judul\s*:\s*(.*)$/i);
            if (judulSingleMatch) {
                let fullText = judulSingleMatch[2].trim();
                let lastDashIndex = fullText.lastIndexOf(' - ');
                if (lastDashIndex !== -1) {
                    let title = fullText.substring(0, lastDashIndex).trim();
                    let artist = fullText.substring(lastDashIndex + 3).trim();
                    return {
                        number: judulSingleMatch[1],
                        title: title,
                        artist: artist,
                        queryOnlyTitle: false
                    };
                }
                return {
                    number: judulSingleMatch[1],
                    title: fullText,
                    artist: null,
                    queryOnlyTitle: true
                };
            }

            // ==========================================
            // DEFAULT
            // ==========================================
            return { number: null, title: line, artist: null };
        }



        function parseMultiLine(lines, startIndex) {
        let baris1 = lines[startIndex] || "";
        let baris2 = lines[startIndex + 1] || "";
        let baris3 = lines[startIndex + 2] || "";

        // ==========================================
        // BERSIHKAN KARAKTER TERSEMBUNYI
        // ==========================================
        baris1 = baris1.replace(/[\u200B-\u200D\uFEFF]/g, '');
        baris1 = baris1.replace(/‎/g, '');
        baris1 = baris1.replace(/[🇺🇸🇺🇲🇬🇧🇮🇩]/g, '');
        baris1 = baris1.trim();
        
        baris2 = baris2.replace(/[\u200B-\u200D\uFEFF]/g, '');
        baris2 = baris2.replace(/‎/g, '');
        baris2 = baris2.replace(/[🇺🇸🇺🇲🇬🇧🇮🇩🦈🔥⭐🎵👑💥🍄🎶🌈🌟✨🎯💫🔮🪐]/g, '');
        baris2 = baris2.trim();
        
        baris3 = baris3.replace(/[\u200B-\u200D\uFEFF]/g, '');
        baris3 = baris3.replace(/‎/g, '');
        baris3 = baris3.replace(/[🇺🇸🇺🇲🇬🇧🇮🇩]/g, '');
        baris3 = baris3.trim();
        
        if (baris1 === "") return null;

        // ================================================================
        // CEK FORMAT MULTILINE
        // ================================================================

        // ==========================================
        // FORMAT KHUSUS: nomor. 🇺🇸CHANNEL : artis (baris1)
        //                JUDUL ⭐judul (baris2)
        //                artis (baris3)
        // Contoh: 61. 🇺🇸CHANNEL : Release-Topic
        //         JUDUL ⭐KAMU KEKASIH SETIAKU
        //         ROHYAN ANJANA
        // ==========================================
        let channelStarJudulMatch = baris1.match(/^(\d+)\.\s*[🇺🇸🇺🇲]*\s*CHANNEL\s*:\s*(.*)$/i);
        if (channelStarJudulMatch && baris2.toLowerCase().includes('judul') && baris3 && baris3.trim() !== "") {
            let judulBaris = baris2.replace(/^JUDUL\s*[⭐*]?\s*/i, '').trim();
            let artist = baris3.trim();
            
            return {
                number: channelStarJudulMatch[1],
                title: judulBaris,
                artist: artist,
                lineCount: 3
            };
        }

        // ==========================================
        // FORMAT KHUSUS: nomor. *CHANNEL* : artis (baris1)
        //                *JUDUL* : judul (baris2)
        // ==========================================
        let channelJudulMatch = baris1.match(/^(\d+)\.\s*\*CHANNEL\*\s*:\s*(.*)$/i);
        if (channelJudulMatch && baris2.toLowerCase().includes('judul')) {
            let artistFromChannel = channelJudulMatch[2].trim().toLowerCase();
            let judulBaris = baris2.replace(/\*JUDUL\*\s*:\s*/i, '').trim();
            
            let words = judulBaris.split(' ');
            let artistFromJudul = words.length > 1 ? words[words.length - 1] : '';
            
            let artist;
            let title;
            
            if (artistFromChannel === 'release topic' || artistFromChannel === 'release - topic' || artistFromChannel === 'release-topic') {
                if (artistFromJudul) {
                    artist = artistFromJudul;
                    title = words.slice(0, -1).join(' ');
                } else {
                    artist = artistFromChannel;
                    title = judulBaris;
                }
            } else {
                if (judulBaris.toLowerCase().includes(artistFromChannel)) {
                    let artistLower = artistFromChannel;
                    let titleLower = judulBaris.toLowerCase();
                    let index = titleLower.lastIndexOf(artistLower);
                    if (index !== -1) {
                        title = judulBaris.substring(0, index).trim();
                        artist = artistFromChannel;
                    } else {
                        title = judulBaris;
                        artist = artistFromChannel;
                    }
                } else {
                    title = judulBaris;
                    artist = artistFromChannel;
                }
            }
            
            if (!title || title.trim() === '') {
                title = judulBaris;
            }
            
            return {
                number: channelJudulMatch[1],
                title: title,
                artist: artist,
                lineCount: 2
            };
        }

        // ==========================================
        // FORMAT KHUSUS: nomor. 🇺🇸Ch : artis (baris1)
        //                [emoji]Judul : judul (baris2)
        //                artis (baris3)
        // ==========================================
        let chJudulMatch = baris1.match(/^(\d+)\.\s*[🇺🇸🇺🇲]*\s*Ch\s*:\s*(.*)$/i);
        if (chJudulMatch && baris2.toLowerCase().includes('judul') && baris3 && baris3.trim() !== "") {
            let judulBaris = baris2.replace(/^[^\w\s]*\s*Judul\s*:\s*/i, '').trim();
            let artist = baris3.trim();
            
            return {
                number: chJudulMatch[1],
                title: judulBaris,
                artist: artist,
                lineCount: 3
            };
        }

        // ==========================================
        // FORMAT KHUSUS: nomor *Judul* : judul artis (baris1)
        //                *Channel* : artis (baris2)
        // ==========================================
        let judulChannelStarMatch = baris1.match(/^(\d+)\s*\*Judul\*\s*:\s*(.*)$/i);
        if (judulChannelStarMatch && baris2.toLowerCase().includes('*channel*')) {
            let fullText = judulChannelStarMatch[2].trim();
            let artistFromChannel = baris2.replace(/\*Channel\*\s*:\s*/i, '').trim();
            
            let title = fullText;
            let artist = artistFromChannel;
            
            if (artist && title.toLowerCase().endsWith(artist.toLowerCase())) {
                title = title.substring(0, title.length - artist.length).trim();
            } else if (artist && title.toLowerCase().endsWith(' ' + artist.toLowerCase())) {
                title = title.substring(0, title.length - artist.length - 1).trim();
            }
            
            if (artist && title.toLowerCase().includes(artist.toLowerCase())) {
                let artistLower = artist.toLowerCase();
                let titleLower = title.toLowerCase();
                let index = titleLower.lastIndexOf(artistLower);
                if (index !== -1) {
                    title = title.substring(0, index).trim();
                }
            }
            
            if (!title.trim()) {
                title = fullText;
            }
            
            return {
                number: judulChannelStarMatch[1],
                title: title,
                artist: artist,
                lineCount: 2
            };
        }

        // ==========================================
        // FORMAT KHUSUS: nomor🇺🇸Ch : artis (baris1)
        //                Judul : judul (baris2)
        //                artis (baris3)
        // ==========================================
        let chJudulArtisMatch = baris1.match(/^(\d+)\s*[🇺🇸🇺🇲]*\s*Ch\s*:\s*(.*)$/i);
        if (chJudulArtisMatch && baris2.toLowerCase().includes('judul') && baris3 && baris3.trim() !== "") {
            let judulBaris = baris2.replace(/Judul\s*:\s*/i, '').trim();
            let artist = baris3.trim();
            
            return {
                number: chJudulArtisMatch[1],
                title: judulBaris,
                artist: artist,
                lineCount: 3
            };
        }

        // ==========================================
        // FORMAT KHUSUS: nomor Judul: judul (baris1) + artis (baris2)
        // ==========================================
        let judulTanpaTitik = baris1.match(/^(\d+)\s+Judul\s*:\s*(.*)$/i);
        if (judulTanpaTitik && baris2 && !baris2.match(/^\d+\./) && !baris2.toLowerCase().includes('channel') && !baris2.toLowerCase().includes('ch:')) {
            return {
                number: judulTanpaTitik[1],
                title: judulTanpaTitik[2].trim(),
                artist: baris2.trim(),
                lineCount: 2
            };
        }

        // ==========================================
        // FORMAT 1: nomor. JUDUL : judul (baris1) + artis (baris2)
        // ==========================================
        let judulArtisBaru = baris1.match(/^(\d+)\.\s*JUDUL\s*:\s*(.*)$/i);
        if (judulArtisBaru && baris2 && !baris2.match(/^\d+\./) && !baris2.toLowerCase().includes('channel') && !baris2.toLowerCase().includes('ch:')) {
            let title = judulArtisBaru[2].trim();
            let artist = baris2.trim();
            
            let lastDashIndex = title.lastIndexOf(' - ');
            if (lastDashIndex !== -1) {
                let judul = title.substring(0, lastDashIndex).trim();
                let artis = title.substring(lastDashIndex + 3).trim();
                return {
                    number: judulArtisBaru[1],
                    title: judul,
                    artist: artis,
                    lineCount: 1
                };
            }
            
            return {
                number: judulArtisBaru[1],
                title: title,
                artist: artist,
                lineCount: 2
            };
        }

        // ==========================================
        // FORMAT 2: nomor. Judul : judul (baris1) + CH: artis (baris2)
        // ==========================================
        let usJudulChannel = baris1.match(/^(\d+)\.\s*Judul\s*:\s*(.*)$/i);
        if (usJudulChannel && baris2.toLowerCase().includes('ch:')) {
            let title = usJudulChannel[2].trim();
            let artist = baris2.replace(/^CH\s*:\s*/i, '').trim();
            
            return {
                number: usJudulChannel[1],
                title: title,
                artist: artist,
                lineCount: 2
            };
        }

        // ==========================================
        // FORMAT 3: nomor.Judul: judul artis + Channel
        // ==========================================
        let judulChannelBaru = baris1.match(/^(\d+)\.\s*Judul\s*:\s*(.*)$/i);
        if (judulChannelBaru && baris2.toLowerCase().includes('channel')) {
            let fullText = judulChannelBaru[2].trim();
            
            let words = fullText.split(' ');
            let title, artist;
            
            if (words.length > 1) {
                artist = words[words.length - 1];
                title = words.slice(0, -1).join(' ');
            } else {
                title = fullText;
                artist = null;
            }
            
            return {
                number: judulChannelBaru[1],
                title: title,
                artist: artist,
                lineCount: 2
            };
        }

        // ==========================================
        // FORMAT 4: nomor. JUDUL: judul - artis + CHANNEL
        // ==========================================
        let judulChannelNewMatch = baris1.match(/^(\d+)\.\s*JUDUL:\s*(.*)$/i);
        if (judulChannelNewMatch && baris2.toLowerCase().includes('channel')) {
            let judulArtis = judulChannelNewMatch[2].trim();
            let artistMatch = judulArtis.match(/^(.*?)\s*-\s*(.*)$/);
            let title, artist;
            
            if (artistMatch) {
                title = artistMatch[1].trim();
                artist = artistMatch[2].trim();
            } else {
                title = judulArtis;
                artist = null;
            }
            
            return {
                number: judulChannelNewMatch[1],
                title: title,
                artist: artist,
                lineCount: 2
            };
        }

        // ==========================================
        // FORMAT 5: nomor. Judul : teks + baris2 artis (tanpa CH:)
        // ==========================================
        let matchUsJudul = baris1.match(/^(\d+)\.\s*Judul\s*:\s*(.*)$/i);
        if (matchUsJudul && baris2 && !baris2.match(/^\d+\./) && !baris2.toLowerCase().includes('channel') && !baris2.toLowerCase().includes('ch:')) {
            return {
                number: matchUsJudul[1],
                title: matchUsJudul[2].trim(),
                artist: baris2.trim(),
                lineCount: 2
            };
        }

        // ==========================================
        // FORMAT 6: nomor. JUDUL: teks - artis + CHANNEL
        // ==========================================
        let matchJudul = baris1.match(/^(\d+)\.\s*JUDUL:\s*(.*)$/i);
        if (matchJudul && baris2.toLowerCase().includes('channel')) {
            let judulArtis = matchJudul[2].trim();
            let artistMatch = judulArtis.match(/^(.*?)\s*-\s*(.*)$/);
            let title, artist;
            
            if (artistMatch) {
                title = artistMatch[1].trim();
                artist = artistMatch[2].trim();
            } else {
                title = judulArtis;
                artist = null;
            }
            
            return {
                number: matchJudul[1],
                title: title,
                artist: artist,
                lineCount: 2
            };
        }

        // ==========================================
        // FORMAT 7: nomor Judul : teks + Channel
        // ==========================================
        let judulChannelMatch = baris1.match(/^(\d+)\s+Judul\s*:\s*(.*)$/i);
        if (judulChannelMatch && baris2.toLowerCase().includes('channel')) {
            return {
                number: judulChannelMatch[1],
                title: judulChannelMatch[2].trim(),
                artist: null,
                lineCount: 2
            };
        }

        // ==========================================
        // FORMAT 8: nomor diikuti emoji + judul, artis di baris 2
        // ==========================================
        let matchAngkaEmoji = baris1.match(/^(\d+)\s*[^\w\s]+\s+(.*)$/);
        if (matchAngkaEmoji && baris2 && !baris2.match(/^\d+\./) && !baris2.toLowerCase().includes('channel') && !baris2.toLowerCase().includes('ch:')) {
            return {
                number: matchAngkaEmoji[1],
                title: matchAngkaEmoji[2].trim(),
                artist: baris2.trim(),
                lineCount: 2
            };
        }

        // ==========================================
        // FORMAT 9: nomor. Ch : ... + Judul : ...
        // ==========================================
        let matchBaris1 = baris1.match(/^(\d+)\./);
        if (matchBaris1 && baris2.includes('Judul')) {
            let judulArtis = baris2.replace(/🔥?Judul\s*:\s*/i, '').trim();
            let artis = null;
            let judul = judulArtis;
            
            let words = judulArtis.split(' ');
            if (words.length > 1) {
                let lastWord = words[words.length - 1];
                let secondLast = words[words.length - 2] || '';
                if (lastWord.match(/^[A-Z][a-z]+/) && !secondLast.match(/^(the|and|of|in|to|for|with|on|at|by|is|are)$/i)) {
                    artis = lastWord;
                    judul = words.slice(0, -1).join(' ');
                }
            }
            
            return {
                number: matchBaris1[1],
                title: judul,
                artist: artis,
                lineCount: 2
            };
        }

        // ==========================================
        // FORMAT 10: nomor.judul + artis (baris terpisah)
        // ==========================================
        let matchBaris1Lama = baris1.match(/^(\d+)\.(.*)/);
        if (matchBaris1Lama && baris2 && !baris2.includes('CHANNEL') && !baris2.includes('JUDUL') && !baris2.includes('Judul') && !baris2.toLowerCase().includes('ch:')) {
            if (!baris2.match(/^\d+\./)) {
                return {
                    number: matchBaris1Lama[1],
                    title: matchBaris1Lama[2].trim(),
                    artist: baris2.trim(),
                    lineCount: 2
                };
            }
        }

        // ==========================================
        // FORMAT 11: CHANNEL + JUDUL + artis (3 baris)
        // ==========================================
        if (baris1.includes('CHANNEL') && baris2.includes('JUDUL')) {
            let nomor = baris1.match(/^(\d+)\./);
            let judul = baris2.replace(/JUDUL\s*[⭐*]?\s*/, '').trim();
            let artis = baris3.trim();
            
            return {
                number: nomor ? nomor[1] : null,
                title: judul,
                artist: artis,
                lineCount: 3
            };
        }
        
        return null;
    }
        // ============================================================
        // ⚠️ DI BAWAH INI JANGAN DIUBAH
        // ============================================================
        
        const inputEl = document.getElementById('input');
        const outputEl = document.getElementById('output');
        const autoGenToggle = document.getElementById('autoGenerate');
        const compactToggle = document.getElementById('compactMode');
        const charCountSpan = document.getElementById('charCount');
        const lineCountSpan = document.getElementById('lineCount');
        const linkCountSpan = document.getElementById('linkCount');
        const openLinksBtn = document.getElementById('openLinksBtn');
        const openBtnCountSpan = document.getElementById('openBtnCount');
        const generateBtn = document.getElementById('generateBtn');


        // ==========================================
        // UPDATE STATUS
        // ==========================================
        function updateStats() {
            const text = inputEl.value;
            const linesRaw = text.split('\n');
            const nonEmptyLines = linesRaw.filter(l => l.trim().length > 0).length;
            const totalChars = text.length;
            
            // Update stat bubbles
            charCountSpan.innerText = totalChars;
            lineCountSpan.innerText = nonEmptyLines;
            
            // Update stat di bawah textarea (inputLines & inputChars)
            const inputLinesSpan = document.getElementById('inputLines');
            const inputCharsSpan = document.getElementById('inputChars');
            if (inputLinesSpan) inputLinesSpan.innerText = nonEmptyLines;
            if (inputCharsSpan) inputCharsSpan.innerText = totalChars;
            
            // Tombol generate mati jika input kosong
            if (generateBtn) generateBtn.disabled = text.length === 0;
            
            if (autoGenToggle.checked && text.length > 0) {
                generate();
            } else if (text.length === 0) {
                outputEl.value = '';
                linkCountSpan.innerText = '0';
                if (openBtnCountSpan) openBtnCountSpan.innerText = '0';
                if (openLinksBtn) openLinksBtn.disabled = true;
            }
        }

        function clearInput() { 
            inputEl.value = ''; 
            outputEl.value = '';  // ← output ikut clear
            linkCountSpan.innerText = '0';
            if (openBtnCountSpan) openBtnCountSpan.innerText = '0';
            if (openLinksBtn) openLinksBtn.disabled = true;
            updateStats(); 
        }

        // ==========================================
        // GENERATE
        // ==========================================
        function generate() {
            const lines = inputEl.value.split(/\r?\n/);
            const results = [];
            let i = 0;
            
            while (i < lines.length) {
                let line = lines[i];
                
                let cleanedLine = line.replace(/[\u200B-\u200D\uFEFF]/g, '').replace(/‎/g, '').trim();
                if (cleanedLine === "") {
                    i++;
                    continue;
                }
                
                let multi = parseMultiLine(lines, i);
                if (multi) {
                    let searchQuery = multi.artist ? `${multi.title} ${multi.artist}` : multi.title;
                    // BERSIHKAN EMOJI DARI SEARCH QUERY
                    searchQuery = searchQuery.replace(/[🇺🇸🇺🇲🇬🇧🇮🇩]/g, '').trim();
                    let query = encodeURIComponent(searchQuery.toLowerCase()).replace(/%20/g, "+");
                    let url = `https://www.youtube.com/results?search_query=${query}`;
                    
                    // Judul dan artis dibersihkan dari emoji
                    let cleanTitle = multi.title.replace(/[🇺🇸🇺🇲🇬🇧🇮🇩]/g, '').trim();
                    let cleanArtist = (multi.artist || '').replace(/[🇺🇸🇺🇲🇬🇧🇮🇩]/g, '').trim();
                    let titleLine = multi.number ? `${multi.number}. ${cleanTitle} ${cleanArtist}`.trim() : `${cleanTitle} ${cleanArtist}`.trim();
                    
                    results.push(`${titleLine}\n${url}`);
                    i += multi.lineCount;
                    continue;
                }
                
                let parsed = parseLine(line);
                if (parsed && parsed.title) {
                    let searchQuery = parsed.queryOnlyTitle ? parsed.title : (parsed.artist ? `${parsed.title} ${parsed.artist}` : parsed.title);
                    // BERSIHKAN EMOJI DARI SEARCH QUERY
                    searchQuery = searchQuery.replace(/[🇺🇸🇺🇲🇬🇧🇮🇩]/g, '').trim();
                    let query = encodeURIComponent(searchQuery.toLowerCase()).replace(/%20/g, "+");
                    let url = `https://www.youtube.com/results?search_query=${query}`;
                    
                    let titleLine;
                    if (parsed.displayTemplate) {
                        // Bersihkan displayTemplate dari emoji
                        titleLine = parsed.displayTemplate.replace(/[🇺🇸🇺🇲🇬🇧🇮🇩]/g, '').trim();
                    } else if (parsed.number) {
                        let cleanTitle = parsed.title.replace(/[🇺🇸🇺🇲🇬🇧🇮🇩]/g, '').trim();
                        let cleanArtist = (parsed.artist || '').replace(/[🇺🇸🇺🇲🇬🇧🇮🇩]/g, '').trim();
                        titleLine = parsed.artist ? `${parsed.number}. ${cleanTitle}\n${cleanArtist}` : `${parsed.number}. ${cleanTitle}`;
                    } else {
                        let cleanTitle = parsed.title.replace(/[🇺🇸🇺🇲🇬🇧🇮🇩]/g, '').trim();
                        let cleanArtist = (parsed.artist || '').replace(/[🇺🇸🇺🇲🇬🇧🇮🇩]/g, '').trim();
                        titleLine = parsed.artist ? `${cleanTitle}\n${cleanArtist}` : cleanTitle;
                    }
                    
                    if (compactToggle.checked) {
                        results.push(url);
                    } else {
                        results.push(`${titleLine}\n${url}`);
                    }
                }
                i++;
            }
            
            // Semua output jadi lowercase
            let finalOutput = results.join("\n\n").toLowerCase();
            outputEl.value = finalOutput;
            linkCountSpan.innerText = results.length;
            
            const totalLinks = results.length;
            linkCountSpan.innerText = totalLinks;
            if (openBtnCountSpan) openBtnCountSpan.innerText = totalLinks;
            if (openLinksBtn) {
                openLinksBtn.disabled = totalLinks === 0;
                openLinksBtn.innerHTML = `<i class="fas fa-external-link-alt"></i> Buka (${totalLinks})`;
            }
        }

        // ============================
        function showToast(message, type = "success") {
            const toast = document.getElementById("toast");

            toast.textContent = message;
            toast.className = `toast ${type} show`;

            clearTimeout(toast.timer);
            toast.timer = setTimeout(() => {
                toast.classList.remove("show");
            }, 2200);
        }

        async function copyResult() {
            if (!outputEl.value) {
                showToast("⚠️ Tidak ada data", "warning");
                return;
            }

            try {
                await navigator.clipboard.writeText(outputEl.value);
                showToast("✅ Berhasil disalin ke clipboard", "success");
            } catch {
                showToast("❌ Gagal menyalin", "error");
            }
        }

        function exportTxt() {
            if (!outputEl.value) return alert('Tidak ada data');
            let blob = new Blob([outputEl.value], {type: 'text/plain'});
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `youtube_links_${Date.now()}.txt`;
            a.click();
        }

        function clearInput() { 
            inputEl.value = ''; 
            updateStats(); 
        }
        
        function clearOutput() {
            outputEl.value = '';
            linkCountSpan.innerText = '0';
            if (openBtnCountSpan) openBtnCountSpan.innerText = '0';
            if (openLinksBtn) openLinksBtn.disabled = true;
        }
        
        function openAllLinks() {
            const outputText = outputEl.value;
            const linkRegex = /https:\/\/www\.youtube\.com\/results\?search_query=[^\s]+/g;
            const matches = outputText.match(linkRegex);
            if (matches && matches.length) {
                const toOpen = matches.slice(0, 12);
                alert(`Membuka ${toOpen.length} link... (browser mungkin memblokir popup)`);
                toOpen.forEach(link => window.open(link, '_blank'));
            } else {
                alert('Tidak ada link YouTube yang valid');
            }
        }
        
        function loadSample() {
            inputEl.value = `1. 🇺🇲 Judul: binary signal vrelex colix

2. 🇺🇲 Judul: digital pulse urelex dexil

3. 🇺🇲 Judul: void control nexar vellon`;
            updateStats();
        }
        
        inputEl.addEventListener('input', updateStats);
        autoGenToggle.addEventListener('change', () => generate());
        compactToggle.addEventListener('change', () => generate());

        // ==========================================
        // SHORTCUT Ctrl + Enter
        // ==========================================
        inputEl.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                generate();
            }
        });    
        
        window.generate = generate;
        window.copyResult = copyResult;
        window.exportTxt = exportTxt;
        window.clearInput = clearInput;
        window.clearOutput = clearOutput;
        window.openAllLinks = openAllLinks;
        window.loadSample = loadSample;
        
        updateStats();
    })

    ();
</script>
