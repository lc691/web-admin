<div class="col-lg-8">
    <div class="card p-3">
        <div class="card-header">
            <div class="d-flex flex-wrap justify-content-between align-items-center w-100 gap-2">
                <!-- Filter Buttons -->
                <div class="d-flex flex-wrap align-items-center gap-2">
                    <div class="btn-group btn-group-sm" role="group" aria-label="Status filters">
                        <button class="btn btn-dark filter-btn active" data-status="">All</button>
                        <button class="btn btn-outline-secondary filter-btn" data-status="Review">Review</button>
                        <button class="btn btn-outline-warning filter-btn" data-status="Approved">Approved</button>
                        <button class="btn btn-outline-success filter-btn" data-status="Live">Live</button>
                        <button class="btn btn-outline-danger filter-btn" data-status="Take Down">Take Down</button>
                        <button class="btn btn-outline-info filter-btn" data-status="Topic">Topic</button>
                    </div>

                    <div class="d-flex flex-wrap align-items-center gap-1">
                        <span class="badge bg-danger-lt px-3 py-2" id="selectedCount">
                            <i class="ti ti-checkbox me-1"></i>
                            0 dipilih
                        </span>

                        <div class="btn-group btn-group-sm" role="group" aria-label="Bulk actions">
                            <button class="btn btn-outline-warning bulk-action-btn" data-status="Approved">
                                <i class="ti ti-check me-1"></i> Approve
                            </button>
                            <button class="btn btn-outline-success bulk-action-btn" data-status="Live">
                                <i class="ti ti-player-play me-1"></i> Live
                            </button>
                            <button class="btn btn-outline-secondary bulk-action-btn" data-status="Review">
                                <i class="ti ti-edit me-1"></i> Review
                            </button>
                            <button class="btn btn-outline-danger bulk-action-btn" data-status="Take Down">
                                <i class="ti ti-trash me-1"></i> Take Down
                            </button>
                            <button class="btn btn-outline-info bulk-action-btn" data-status="Topic">
                                <i class="ti ti-tag me-1"></i> Topic
                            </button>
                        </div>

                        <div class="btn-group btn-group-sm" role="group" aria-label="Actions">
                            <a href="/songs/import" class="btn btn-success">
                                <i class="ti ti-file-import me-1"></i> Import
                            </a>
                            <button form="exportForm" type="submit" class="btn btn-primary">
                                <i class="ti ti-file-export me-1"></i> Export
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <form id="exportForm" method="post" action="/songs/export-txt">
                <table id="songsTable" class="table table-vcenter table-hover">
                    <thead>
                        <tr>
                            <th width="40"><input type="checkbox" id="checkAll" class="form-check-input"></th>
                            <th>ID</th>
                            <th>Artis</th>
                            <th>Judul</th>
                            <th>Status</th>
                            <th>Rilis</th>
                        </tr>
                    </thead>
                </table>
            </form>
        </div>
    </div>
</div>
